services:
  - type: web
    name: "rolex-fitness-factory"
    env: "static"
    buildCommand: "npm install && npm run build"
    staticPublishDir: "dist"
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
