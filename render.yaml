services:
  - type: static
    name: "rolex-fitness-factory"
    buildCommand: "npm install && npm run build"
    publishDir: "dist"
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
